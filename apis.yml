name: CyberConnect
description: CyberConnect is a Web3 social graph protocol that enables developers
  to build decentralized social applications. It provides GraphQL and SDK-based APIs
  for accessing social graphs, profiles, followers, connections, and recommendation
  data across Ethereum and Solana networks. The protocol stores user-generated social
  data in a decentralized manner, allowing users to truly own their identities, content,
  and connections.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Web3
- Social Graph
- Decentralized
- GraphQL
- Blockchain
- Social Network
- Identity
