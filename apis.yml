- name: CyberConnect JavaScript SDK
  description: The CyberConnect JavaScript SDK provides connect and disconnect (follow
    and unfollow) functions for writing social graph connection data. It encapsulates
    complex authentication logic with Ceramic Network into simple-to-use functions,
    supporting Ethereum and Solana blockchains. The SDK uses a namespace system so
    applications can isolate their social data.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://cyberconnect-docs-v2.vercel.app/guides/authentication/api-key
  baseURL: https://api.cybertino.io/connect/
