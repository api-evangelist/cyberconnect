apis:
- name: CyberConnect GraphQL API
  description: The CyberConnect GraphQL Indexer API provides precise and flexible
    queries for social graph data. Developers can query address identities, follower
    and following lists, social connections between addresses, and get personalized
    connection recommendations. The API supports Ethereum and Solana networks and
    uses namespace-based data isolation for multi-tenant applications.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://cyberconnect-docs-v2.vercel.app/
  baseURL: https://api.cybertino.io/connect/
  tags:
  - GraphQL
  - Social Graph
  - Identity
  - Followers
  - Connections
  - Recommendations
  properties:
